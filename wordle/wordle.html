<!DOCTYPE html>
<html lang="ja">
    <head>
        <title>ごくふつうのwordle</title>
        <link rel="stylesheet" href="wordlestyle.css">
        <!--webfont-->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=IBM+Plex+Sans+JP&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    </head>
    <body>
        <div class="wordle-wrapper">
            <h1>ごくふつうのwordle</h1>
            <div class="rules">
                <input type="checkbox" id="setsumei_check">
                <label for="setsumei_check"></label>
                <div class="rules_info">
                    <p>5文字の英単語を当てるゲームです。<br />
                    回答は、画面のキーボードを使って入力します。<br />
                    回答は一文字ずつ判定され、正解との近さによって色分けされます。</p>
                    <p class="wide"><span class="mohankaito key_grey">灰</span><span class="mohankaito key_grey">色</span>は正解に全く含まれない文字、<span class="mohankaito key_yellow">黄</span><span class="mohankaito key_yellow">色</span>は正解に含まれるが語中での出現箇所が異なる文字、<span class="mohankaito key_green">緑</span>は語中の出現箇所も正しい文字です。全部<span class="mohankaito key_green">緑</span>になれば正解です。</p>
                    <input type="checkbox" id="setsumei_check2">
                </div>
            </div>
            <div class="announce-area">
                <div id="correct" class="box noshow">
                    <p class="message"><b class="correctmessage">正解!</b><br /><span id="ans1"></span></p>
                    <button class="reset-button" onclick="reset()">もう一度やる</button>
                </div>
                <div id="incorrect" class="box noshow">
                    <p class="message"><b class="incorrectmessage">残念!</b>正解は<br /><span id="ans2"></span></p>
                    <button class="reset-button" onclick="reset()">もう一度やる</button>
                </div>
                <div id="lessletter" class="alert">
                    <p><b>文字数が足りません!</b></p>
                </div>
            </div>
            <div class="answer-area">
                <div class="input-area">
                    <input id="input_0" type="text" maxlength="1" pattern="^[A-Z]+$" class="wordle-inputbox" readonly>
                    <input id="input_1" type="text" maxlength="1" pattern="^[A-Z]+$" class="wordle-inputbox" readonly>
                    <input id="input_2" type="text" maxlength="1" pattern="^[A-Z]+$" class="wordle-inputbox" readonly>
                    <input id="input_3" type="text" maxlength="1" pattern="^[A-Z]+$" class="wordle-inputbox" readonly>
                    <input id="input_4" type="text" maxlength="1" pattern="^[A-Z]+$" class="wordle-inputbox" readonly> 
                </div>
                <div class="input-area">
                    <input id="input_5" type="text" maxlength="1" pattern="^[A-Z]+$" class="wordle-inputbox" readonly>
                    <input id="input_6" type="text" maxlength="1" pattern="^[A-Z]+$" class="wordle-inputbox" readonly>
                    <input id="input_7" type="text" maxlength="1" pattern="^[A-Z]+$" class="wordle-inputbox" readonly>
                    <input id="input_8" type="text" maxlength="1" pattern="^[A-Z]+$" class="wordle-inputbox" readonly>
                    <input id="input_9" type="text" maxlength="1" pattern="^[A-Z]+$" class="wordle-inputbox" readonly> 
                </div>
                <div class="input-area">
                    <input id="input_10" type="text" maxlength="1" pattern="^[A-Z]+$" class="wordle-inputbox" readonly>
                    <input id="input_11" type="text" maxlength="1" pattern="^[A-Z]+$" class="wordle-inputbox" readonly>
                    <input id="input_12" type="text" maxlength="1" pattern="^[A-Z]+$" class="wordle-inputbox" readonly>
                    <input id="input_13" type="text" maxlength="1" pattern="^[A-Z]+$" class="wordle-inputbox" readonly>
                    <input id="input_14" type="text" maxlength="1" pattern="^[A-Z]+$" class="wordle-inputbox" readonly> 
                </div>
                <div class="input-area">
                    <input id="input_15" type="text" maxlength="1" pattern="^[A-Z]+$" class="wordle-inputbox" readonly>
                    <input id="input_16" type="text" maxlength="1" pattern="^[A-Z]+$" class="wordle-inputbox" readonly>
                    <input id="input_17" type="text" maxlength="1" pattern="^[A-Z]+$" class="wordle-inputbox" readonly>
                    <input id="input_18" type="text" maxlength="1" pattern="^[A-Z]+$" class="wordle-inputbox" readonly>
                    <input id="input_19" type="text" maxlength="1" pattern="^[A-Z]+$" class="wordle-inputbox" readonly> 
                </div>
                <div class="input-area">
                    <input id="input_20" type="text" maxlength="1" pattern="^[A-Z]+$" class="wordle-inputbox" readonly>
                    <input id="input_21" type="text" maxlength="1" pattern="^[A-Z]+$" class="wordle-inputbox" readonly>
                    <input id="input_22" type="text" maxlength="1" pattern="^[A-Z]+$" class="wordle-inputbox" readonly>
                    <input id="input_23" type="text" maxlength="1" pattern="^[A-Z]+$" class="wordle-inputbox" readonly>
                    <input id="input_24" type="text" maxlength="1" pattern="^[A-Z]+$" class="wordle-inputbox" readonly> 
                </div>
                <div class="input-area">
                    <input id="input_25" type="text" maxlength="1" pattern="^[A-Z]+$" class="wordle-inputbox" readonly>
                    <input id="input_26" type="text" maxlength="1" pattern="^[A-Z]+$" class="wordle-inputbox" readonly>
                    <input id="input_27" type="text" maxlength="1" pattern="^[A-Z]+$" class="wordle-inputbox" readonly>
                    <input id="input_28" type="text" maxlength="1" pattern="^[A-Z]+$" class="wordle-inputbox" readonly>
                    <input id="input_29" type="text" maxlength="1" pattern="^[A-Z]+$" class="wordle-inputbox" readonly> 
                </div>
            </div>
            <div class="keyboard-area">
                <div class="keybord-row row1">
                    <button onClick = "press('Q')" id="key_Q" class="key">Q</button>
                    <button onClick = "press('W')" id="key_W" class="key">W</button>
                    <button onClick = "press('E')" id="key_E" class="key">E</button>
                    <button onClick = "press('R')" id="key_R" class="key">R</button>
                    <button onClick = "press('T')" id="key_T" class="key">T</button>
                    <button onClick = "press('Y')" id="key_Y" class="key">Y</button>
                    <button onClick = "press('U')" id="key_U" class="key">U</button>
                    <button onClick = "press('I')" id="key_I" class="key">I</button>
                    <button onClick = "press('O')" id="key_O" class="key">O</button>
                    <button onClick = "press('P')" id="key_P" class="key">P</button>
                    
                </div>
                <div class="keybord-row">
                    <button onClick = "press('A')" id="key_A" class="key">A</button>
                    <button onClick = "press('S')" id="key_S" class="key">S</button>
                    <button onClick = "press('D')" id="key_D" class="key">D</button>
                    <button onClick = "press('F')" id="key_F" class="key">F</button>
                    <button onClick = "press('G')" id="key_G" class="key">G</button>
                    <button onClick = "press('H')" id="key_H" class="key">H</button>
                    <button onClick = "press('J')" id="key_J" class="key">J</button>
                    <button onClick = "press('K')" id="key_K" class="key">K</button>
                    <button onClick = "press('L')" id="key_L" class="key">L</button>

                </div>
                <div class="keybord-row">
                    <input id="submit" type="submit" value="Enter">
                    <button onClick = "press('Z')" id="key_Z" class="key">Z</button>
                    <button onClick = "press('X')" id="key_X" class="key">X</button>
                    <button onClick = "press('C')" id="key_C" class="key">C</button>
                    <button onClick = "press('V')" id="key_V" class="key">V</button>
                    <button onClick = "press('B')" id="key_B" class="key">B</button>
                    <button onClick = "press('N')" id="key_N" class="key">N</button>
                    <button onClick = "press('M')" id="key_M" class="key">M</button>
                    <button onClick = "backspace()" class="key-wide">←</button>
                </div>
                
            </div>
        </div>

        <script src="wordle.js"></script>
    </body>
</html>
